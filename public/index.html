<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SEO Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--bg2:#0d1220;--bg3:#111827;--card:#161f30;
  --red:#d71d43;--red2:#a01530;--green:#10b981;--yellow:#f59e0b;
  --blue:#3b82f6;--muted:rgba(255,255,255,.45);--border:rgba(255,255,255,.08);
  --white:#f0f4ff;
}
body{font-family:'Segoe UI','Heebo',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;direction:rtl}
/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.sidebar{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{display:flex;flex-direction:column;overflow:hidden}
/* ── HEADER ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;gap:14px}
header h1{font-size:20px;font-weight:800;letter-spacing:.5px}
header h1 span{color:var(--red)}
.header-status{margin-right:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* ── SIDEBAR ── */
.sidebar-header{padding:20px 18px 12px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600}
.site-list{flex:1;overflow-y:auto;padding:0 10px 10px}
.site-item{
  padding:14px 14px;border-radius:10px;cursor:pointer;margin-bottom:6px;
  border:1px solid transparent;transition:all .2s;position:relative;
}
.site-item:hover{background:var(--card);border-color:var(--border)}
.site-item.active{background:var(--card);border-color:rgba(215,29,67,.4)}
.site-item .site-name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-item .site-url{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.site-item .site-meta{display:flex;align-items:center;gap:8px;margin-top:8px}
.score-badge{
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;
}
.score-badge.high{background:rgba(16,185,129,.2);color:#10b981}
.score-badge.mid{background:rgba(245,158,11,.2);color:#f59e0b}
.score-badge.low{background:rgba(215,29,67,.2);color:#d71d43}
.score-badge.none{background:rgba(255,255,255,.08);color:var(--muted)}
.site-cron{font-size:10px;color:var(--muted);direction:ltr}
.running-indicator{
  position:absolute;top:10px;left:10px;
  width:8px;height:8px;border-radius:50%;background:var(--green);
  animation:pulse 1s infinite;display:none;
}
.site-item.running .running-indicator{display:block}
.add-site-btn{
  margin:10px;padding:12px;border-radius:10px;
  background:rgba(215,29,67,.1);border:1px dashed rgba(215,29,67,.3);
  color:var(--red);font-size:13px;font-weight:600;cursor:pointer;
  text-align:center;transition:all .2s;
}
.add-site-btn:hover{background:rgba(215,29,67,.18);border-color:rgba(215,29,67,.5)}
/* ── SETTINGS BAR ── */
.settings-bar{padding:12px 18px;border-top:1px solid var(--border);font-size:12px}
.settings-bar label{display:block;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;font-size:10px;text-transform:uppercase}
.api-row{display:flex;gap:6px}
.api-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--white);font-size:12px;direction:ltr;text-align:left;outline:none}
.api-input:focus{border-color:rgba(215,29,67,.4)}
.api-save{padding:7px 14px;background:var(--red);border:none;border-radius:6px;color:#fff;font-size:12px;cursor:pointer;font-weight:600;transition:opacity .2s}
.api-save:hover{opacity:.85}
/* ── MAIN CONTENT ── */
.main-header{padding:24px 32px 0;display:flex;align-items:center;gap:16px}
.main-header h2{font-size:22px;font-weight:800}
.run-btn{
  margin-right:auto;
  padding:10px 24px;background:var(--red);border:none;border-radius:8px;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;
  transition:opacity .2s,transform .1s;display:flex;align-items:center;gap:8px;
}
.run-btn:hover{opacity:.88}
.run-btn:active{transform:scale(.97)}
.run-btn:disabled{opacity:.4;cursor:not-allowed}
.delete-btn{
  padding:10px 16px;background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.2);
  border-radius:8px;color:#ff6060;font-size:13px;cursor:pointer;transition:all .2s;
}
.delete-btn:hover{background:rgba(255,60,60,.2)}
/* ── SCORE CARDS ── */
.score-section{padding:20px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.score-card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border)}
.score-card .sc-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.score-card .sc-val{font-size:28px;font-weight:800}
.score-card .sc-sub{font-size:11px;color:var(--muted);margin-top:4px}
.sc-total .sc-val{color:var(--red)}
.sc-content .sc-val{color:var(--blue)}
.sc-publish .sc-val{color:var(--green)}
.sc-index .sc-val{color:var(--yellow)}
/* ── SCHEDULE SECTION ── */
.schedule-section{padding:0 32px 16px}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;font-weight:600}
.schedule-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.field input,.field select{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;color:var(--white);font-size:13px;outline:none;
  transition:border-color .2s;font-family:inherit;
}
.field input:focus,.field select:focus{border-color:rgba(215,29,67,.5)}
.field input[type="time"]{direction:ltr;text-align:left}
.days-row{display:flex;gap:6px;flex-wrap:wrap}
.day-btn{
  padding:6px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;
}
.day-btn.on{background:rgba(215,29,67,.2);border-color:rgba(215,29,67,.5);color:var(--white)}
.save-schedule{
  margin-top:12px;padding:9px 20px;background:var(--red);border:none;border-radius:8px;
  color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s;
}
.save-schedule:hover{opacity:.85}
/* ── LOG WINDOW ── */
.log-section{flex:1;padding:0 32px 24px;display:flex;flex-direction:column;min-height:0}
.log-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.log-clear{
  margin-right:auto;font-size:11px;color:var(--muted);background:none;border:none;
  cursor:pointer;padding:4px 8px;border-radius:4px;transition:color .2s;
}
.log-clear:hover{color:var(--white)}
.log-window{
  flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;overflow-y:auto;font-family:'Courier New',monospace;font-size:12.5px;
  line-height:1.8;min-height:200px;max-height:320px;
}
.log-line{display:flex;gap:10px;align-items:flex-start;padding:2px 0}
.log-ts{color:rgba(255,255,255,.25);flex-shrink:0;font-size:11px;padding-top:1px}
.log-msg.info{color:rgba(255,255,255,.8)}
.log-msg.success{color:#10b981}
.log-msg.error{color:#f87171}
.log-msg.warn{color:#f59e0b}
.log-msg.score{color:var(--red);font-size:16px;font-weight:700}
.log-separator{border-top:1px solid var(--border);margin:8px 0}
.log-empty{color:var(--muted);text-align:center;padding:40px 0;font-size:13px}
/* ── HISTORY ── */
.history-section{padding:0 32px 24px}
.history-table{width:100%;border-collapse:collapse;font-size:12px}
.history-table th{text-align:right;padding:8px 12px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.8px}
.history-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
.history-table tr:last-child td{border-bottom:none}
/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:32px;width:480px;max-width:95vw;
  transform:translateY(20px);transition:transform .2s;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-size:18px;font-weight:800;margin-bottom:24px}
.modal .field{margin-bottom:16px}
.modal-btns{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
.btn-cancel{padding:10px 20px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:13px;transition:all .2s}
.btn-cancel:hover{border-color:rgba(255,255,255,.2);color:var(--white)}
.btn-add{padding:10px 24px;background:var(--red);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-add:hover{opacity:.85}
/* ── EMPTY STATE ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted);padding:60px}
.empty-state svg{opacity:.3;width:64px;height:64px}
.empty-state p{font-size:14px;text-align:center;line-height:1.6}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
</style>
</head>
<body>

<div class="layout">
  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-header">אתרים לקידום</div>
    <div class="site-list" id="siteList"></div>
    <div class="add-site-btn" onclick="openModal()">+ הוסף אתר חדש</div>
    <div class="settings-bar">
      <label>Claude API Key</label>
      <div class="api-row">
        <input class="api-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." />
        <button class="api-save" onclick="saveApiKey()">שמור</button>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main">
    <header>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#d71d43" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <h1>SEO <span>Dashboard</span></h1>
      <div class="header-status"><span class="dot"></span> מחובר</div>
    </header>

    <div id="mainContent">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <p>הוסף אתר ראשון כדי להתחיל<br/>לקדם בגוגל אוטומטית</p>
        <div class="add-site-btn" style="margin:0;width:200px" onclick="openModal()">+ הוסף אתר</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>הוספת אתר לקידום</h3>
    <div class="field">
      <label>שם האתר</label>
      <input type="text" id="mName" placeholder="האתר שלי"/>
    </div>
    <div class="field">
      <label>כתובת URL</label>
      <input type="url" id="mUrl" placeholder="https://example.com" dir="ltr"/>
    </div>
    <div class="field">
      <label>תיקיית הפרויקט (אופציונלי — לפרסום אוטומטי)</label>
      <input type="text" id="mDir" placeholder="/Users/שם/website" dir="ltr"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-add" onclick="addSite()">הוסף אתר</button>
    </div>
  </div>
</div>

<script>
// ══ STATE ══════════════════════════════════════════
let sites = [];
let selectedId = null;
let runningIds = new Set();
let logs = {};   // siteId → [{level,message,ts}]
let ws;
const DAYS = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];
let selectedDays = [1,2,3,4,5];   // ברירת מחדל א-ה
let runHour = '08', runMinute = '00';

// ══ INIT ═══════════════════════════════════════════
async function init() {
  await loadSettings();
  await loadSites();
  connectWS();
}

async function loadSettings() {
  const r = await fetch('/api/settings');
  const d = await r.json();
  if (d.apiKey) document.getElementById('apiKeyInput').placeholder = d.apiKey;
}

async function loadSites() {
  const r = await fetch('/api/sites');
  sites = await r.json();
  renderSidebarList();
  if (sites.length > 0 && !selectedId) selectSite(sites[0].id);
}

// ══ WebSocket ═══════════════════════════════════════
function connectWS() {
  const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${wsProtocol}//${location.host}`);
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'run_start') {
      runningIds.add(msg.siteId);
      renderSidebarList();
      if (msg.siteId === selectedId) setRunBtn(true);
    }
    if (msg.type === 'log') {
      if (!logs[msg.siteId]) logs[msg.siteId] = [];
      if (msg.level === 'info' && logs[msg.siteId].length > 0) {
        logs[msg.siteId].push({ separator: true });
      }
      logs[msg.siteId].push({ level: msg.level, message: msg.message, ts: msg.ts });
      if (msg.siteId === selectedId) renderLog();
    }
    if (msg.type === 'run_end') {
      runningIds.delete(msg.siteId);
      const site = sites.find(s => s.id === msg.siteId);
      if (site) { site.lastScore = msg.score; }
      loadSites();
      if (msg.siteId === selectedId) {
        setRunBtn(false);
        renderScoreCards(msg.score, null);
      }
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

// ══ RENDER SIDEBAR ══════════════════════════════════
function renderSidebarList() {
  const el = document.getElementById('siteList');
  if (sites.length === 0) { el.innerHTML = '<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted)">אין אתרים עדיין</div>'; return; }
  el.innerHTML = sites.map(s => {
    const score = s.lastScore ?? null;
    const cls = score === null ? 'none' : score >= 75 ? 'high' : score >= 40 ? 'mid' : 'low';
    const scoreText = score === null ? 'טרם הורץ' : `${score}/100`;
    const isRunning = runningIds.has(s.id);
    return `<div class="site-item${s.id === selectedId ? ' active' : ''}${isRunning ? ' running' : ''}" onclick="selectSite('${s.id}')">
      <div class="running-indicator"></div>
      <div class="site-name">${s.name}</div>
      <div class="site-url">${s.url}</div>
      <div class="site-meta">
        <span class="score-badge ${cls}">${scoreText}</span>
        <span class="site-cron">${cronToHuman(s.schedule)}</span>
      </div>
    </div>`;
  }).join('');
}

// ══ SELECT SITE ═════════════════════════════════════
function selectSite(id) {
  selectedId = id;
  renderSidebarList();
  const site = sites.find(s => s.id === id);
  if (!site) return;
  // parse schedule
  const parts = site.schedule.split(' ');
  if (parts.length === 5) {
    runMinute = parts[0].padStart(2,'0');
    runHour   = parts[1].padStart(2,'0');
    const daysStr = parts[4];
    selectedDays = daysStr === '*' ? [0,1,2,3,4,5,6] : daysStr.split(',').map(Number);
  }
  renderMain(site);
}

// ══ RENDER MAIN ═════════════════════════════════════
function renderMain(site) {
  const lastEntry = site.history?.[0];
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
  <div class="main-header">
    <div>
      <h2>${site.name}</h2>
      <div style="font-size:12px;color:var(--muted);direction:ltr;text-align:right;margin-top:4px">${site.url}</div>
    </div>
    <button class="run-btn" id="runBtn" onclick="runNow()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      הרץ עכשיו
    </button>
    <button class="delete-btn" onclick="deleteSite()">מחק</button>
  </div>

  <div class="score-section">
    <div class="score-card sc-total">
      <div class="sc-label">ציון כולל</div>
      <div class="sc-val" id="scTotal">${site.lastScore ?? '—'}</div>
      <div class="sc-sub">${lastEntry ? lastEntry.date : 'טרם הורץ'}</div>
    </div>
    <div class="score-card sc-content">
      <div class="sc-label">תוכן SEO</div>
      <div class="sc-val" id="scContent">${lastEntry?.breakdown?.content ?? '—'}</div>
      <div class="sc-sub">מתוך 25</div>
    </div>
    <div class="score-card sc-publish">
      <div class="sc-label">פרסום</div>
      <div class="sc-val" id="scPublish">${lastEntry?.breakdown?.publish ?? '—'}</div>
      <div class="sc-sub">מתוך 25</div>
    </div>
    <div class="score-card sc-index">
      <div class="sc-label">אינדוקס</div>
      <div class="sc-val" id="scIndex">${lastEntry ? ((lastEntry.breakdown?.index_bing??0)+(lastEntry.breakdown?.index_google??0)) : '—'}</div>
      <div class="sc-sub">מתוך 50</div>
    </div>
  </div>

  <div class="schedule-section">
    <div class="section-title">תזמון קידום</div>
    <div class="schedule-grid">
      <div class="field">
        <label>שעת הרצה</label>
        <input type="time" id="schedTime" value="${runHour}:${runMinute}" onchange="timeChanged(this.value)"/>
      </div>
      <div class="field">
        <label>ימים בשבוע</label>
        <div class="days-row" id="daysRow">
          ${DAYS.map((d,i) => `<button class="day-btn${selectedDays.includes(i)?` on`:''}" onclick="toggleDay(${i})">${d}'</button>`).join('')}
        </div>
      </div>
    </div>
    <button class="save-schedule" onclick="saveSchedule()">שמור תזמון</button>
  </div>

  <div class="log-section">
    <div class="log-header">
      <div class="section-title" style="margin-bottom:0">לוג פעולות</div>
      <button class="log-clear" onclick="clearLog()">נקה לוג</button>
    </div>
    <div class="log-window" id="logWindow">
      <div class="log-empty">הלוג יופיע כאן בזמן ריצה</div>
    </div>
  </div>

  ${site.history?.length ? `
  <div class="history-section">
    <div class="section-title">היסטוריה</div>
    <table class="history-table">
      <tr><th>תאריך</th><th>נושא</th><th>ציון</th></tr>
      ${site.history.slice(0,10).map(h=>`
      <tr>
        <td>${h.date}</td>
        <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.topic||'—'}</td>
        <td><span class="score-badge ${h.score>=75?'high':h.score>=40?'mid':'low'}">${h.score}/100</span></td>
      </tr>`).join('')}
    </table>
  </div>` : ''}
  `;
  if (runningIds.has(site.id)) setRunBtn(true);
  renderLog();
}

function renderLog() {
  const el = document.getElementById('logWindow');
  if (!el) return;
  const entries = logs[selectedId] || [];
  if (!entries.length) { el.innerHTML = '<div class="log-empty">הלוג יופיע כאן בזמן ריצה</div>'; return; }
  el.innerHTML = entries.map(e => {
    if (e.separator) return '<div class="log-separator"></div>';
    return `<div class="log-line"><span class="log-ts">${e.ts||''}</span><span class="log-msg ${e.level}">${e.message}</span></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderScoreCards(total, breakdown) {
  const t = document.getElementById('scTotal');
  if (t) t.textContent = total ?? '—';
}

function setRunBtn(running) {
  const btn = document.getElementById('runBtn');
  if (!btn) return;
  btn.disabled = running;
  btn.innerHTML = running
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="animation:spin .8s linear infinite"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> מריץ...`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> הרץ עכשיו`;
}

// ══ ACTIONS ═════════════════════════════════════════
async function runNow() {
  if (!selectedId) return;
  await fetch(`/api/sites/${selectedId}/run`, { method:'POST' });
}

async function deleteSite() {
  if (!selectedId || !confirm('למחוק את האתר?')) return;
  await fetch(`/api/sites/${selectedId}`, { method:'DELETE' });
  selectedId = null;
  await loadSites();
  if (sites.length > 0) selectSite(sites[0].id);
  else document.getElementById('mainContent').innerHTML = '<div class="empty-state"><p>הוסף אתר לקידום</p></div>';
}

async function saveSchedule() {
  if (!selectedId) return;
  const days = selectedDays.length === 7 ? '*' : selectedDays.join(',');
  const schedule = `${runMinute} ${runHour} * * ${days}`;
  await fetch(`/api/sites/${selectedId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ schedule }) });
  const site = sites.find(s=>s.id===selectedId);
  if (site) site.schedule = schedule;
  renderSidebarList();
  alert(`✅ תזמון נשמר: כל יום ${runHour}:${runMinute}`);
}

async function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value;
  await fetch('/api/settings', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ apiKey: key }) });
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('apiKeyInput').placeholder = '✅ נשמר';
}

function clearLog() { if (selectedId) { logs[selectedId] = []; renderLog(); } }

// ══ SCHEDULE HELPERS ════════════════════════════════
function toggleDay(i) {
  if (selectedDays.includes(i)) selectedDays = selectedDays.filter(d=>d!==i);
  else selectedDays = [...selectedDays, i].sort();
  document.getElementById('daysRow').innerHTML =
    DAYS.map((d,idx) => `<button class="day-btn${selectedDays.includes(idx)?' on':''}" onclick="toggleDay(${idx})">${d}'</button>`).join('');
}

function timeChanged(val) {
  const [h,m] = val.split(':');
  runHour = h; runMinute = m;
}

function cronToHuman(cron) {
  if (!cron) return '';
  const [min,hr,,, days] = cron.split(' ');
  const h = hr.padStart(2,'0'), m = min.padStart(2,'0');
  if (days === '*') return `כל יום ${h}:${m}`;
  const names = ['א','ב','ג','ד','ה','ו','ש'];
  const dayNames = days.split(',').map(d=>names[d]||d).join(',');
  return `יום ${dayNames} ${h}:${m}`;
}

// ══ MODAL ═══════════════════════════════════════════
function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('mName').focus(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

async function addSite() {
  const name = document.getElementById('mName').value.trim();
  const url  = document.getElementById('mUrl').value.trim();
  const dir  = document.getElementById('mDir').value.trim();
  if (!url) { alert('נא להזין כתובת URL'); return; }
  const res = await fetch('/api/sites', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name: name||url, url, dir }) });
  const site = await res.json();
  sites.push(site);
  closeModal();
  document.getElementById('mName').value = '';
  document.getElementById('mUrl').value = '';
  document.getElementById('mDir').value = '';
  renderSidebarList();
  selectSite(site.id);
}

// spin animation
const style = document.createElement('style');
style.textContent = '@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}';
document.head.appendChild(style);

init();
</script>
</body>
